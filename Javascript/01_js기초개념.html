<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript 기초 실습</title>
    <style>
        body {padding: 24px; backround: #f5f5f5;}
        h1 {margin-bottom: 24px;}
        h2 { margin: 28px;}

        button {
            padding: 8px 18px;
            background: #1a1a2e;
            color: white;
            border: none;
            cursor: pointer;
        }

        /* 결과창 */
        #output {
            background: rgb(0, 0, 0);
            color: white;
            padding: 14px;
            min-height: 60px;
            margin-top: 10px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1>JavaScript 기초 개념 학습</h1>
    <!-- 결과 출력창 -->
     <div id="output">버튼을 클릭하면 결과가 여기 나옵니다.</div>

     <h2>1. 변수 선언</h2>
     <button onclick="run_variables()">실행</button>

     <h2>2. 자료형</h2>
     <button onclick="run_types()">실행</button>

     <h2>3. 조건문</h2>
     <button onclick="run_conditions()">실행</button>

     <h2>4. 반복문</h2>
     <button onclick="run_loops()">실행</button>

     <h2>5. 함수</h2>
     <button onclick="run_functions()">실행</button>

     <h2>6. 객체 & 배열</h2>
     <button onclick="run_objects()">실행</button>
     <button onclick="run_arrays()">실행</button>

     <h2>7.콜백 함수</h2>
     <button onclick="run_callbacks()">실행</button>

     <script>

        // 결과창 출력 유틸
        const output = document.getElementById('output');
        function log(...args) {
            output.textContent += args.join(' ') + '\n';
        }
        function clear() { output.textContent = ''; }

        // 1. 변수 선언
        function run_variables() {
            clear();
            log('---변수 선언---');

            // var : 함수 스코프, 재선언 가능 - 예전 방식 지금은 사용 금지
            var old = '옛날 방식'

            // let : 블록 스코프, 재할당 가능 (값이 바뀌어야 할 때 사용)
            let name = '홍길동';
            name = '김철수'; // 재할당 가능

            // const : 블록 스코프, 재할당 불가 -> 기본적으로 사용 구너장
            const MAX = 100
            //  MAX = 200 // 오류 발생 -> 재할당 불가

            log('var:', old);
            log('let 변경 후 : ', name);
            log('const MAX : ', MAX);
            log('');
            log('기본은 const, 값이 바뀌어야 할 때만 let!')
        }

        // 2. 자료형
        function run_types() {
            clear();
            log('---자료형---');

            let name = '홍길동'; // string
            let age = 25; // number
            let pass = true; // boolean
            let score = null; // null : 의도적으로 비어있음
            let address; // undefined : 값이 없음
            
            // typeof 연산자 : 변수의 타입을 문자열로 변환
            log('typeof name:', typeof name) // string
            log('typeof age:', typeof age) // number
            log('typeof pass:', typeof pass) // boolean
            log('typeof score:', typeof score) // object(JS의 유명한 버그)
            log('typeof address:', typeof address) // undefined

            // 템플릿 리터럴 : 백틱(`) + ${변수} 로 문자열 안에 변수 삽입
            log(`${name}은 ${age}살입니다.`);

            // 형 변환 주의
            // "+" 는 문자열이 하나라도 있으면 문자열 연결로 동작
            log('"5" + 3 = ', '5' + 3) // "53" 문자열임
            // "-" 는 무조건 숫자 연산으로 동작
            log('"5" - 3 = ', '5' - 3)
        }

        // 3. 조건문
        function run_conditions() {
            clear()
            log('---조건문---');

            let point = 85

            // if / else if / else : 조건에 따라 다른 코드 실행
            if (point >= 90){
                log('A학점');
            } else if (point >= 80) {
                log('B학점');
            } else {
                log('C학점');
            }
        }
     </script>

     
    
</body>
</html>
