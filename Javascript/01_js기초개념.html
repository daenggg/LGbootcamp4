<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>JavaScript 기초 실습</title>
        <style>
            body {
                padding: 24px;
                background: #f5f5f5;
            }
            h1 {
                margin-bottom: 24px;
            }
            h2 {
                margin: 28px;
            }

            button {
                padding: 8px 18px;
                background: #1a1a2e;
                color: white;
                border: none;
                cursor: pointer;
            }

            /* 결과창 */
            #output {
                background: rgb(0, 0, 0);
                color: white;
                padding: 14px;
                min-height: 60px;
                margin-top: 10px;
                white-space: pre-wrap;
            }
        </style>
    </head>
    <body>
        <h1>JavaScript 기초 개념 학습</h1>
        <!-- 결과 출력창 -->
        <div id="output">버튼을 클릭하면 결과가 여기 나옵니다.</div>

        <h2>1. 변수 선언</h2>
        <button onclick="run_variables()">실행</button>

        <h2>2. 자료형</h2>
        <button onclick="run_types()">실행</button>

        <h2>3. 조건문</h2>
        <button onclick="run_conditions()">실행</button>

        <h2>4. 반복문</h2>
        <button onclick="run_loops()">실행</button>

        <h2>5. 함수</h2>
        <button onclick="run_functions()">실행</button>

        <h2>6. 객체 & 배열</h2>
        <button onclick="run_objects()">실행</button>
        <button onclick="run_arrays()">실행</button>

        <h2>7.콜백 함수</h2>
        <button onclick="run_callbacks()">실행</button>

        <script>
            // 결과창 출력 유틸
            const output = document.getElementById("output");
            function log(...args) {
                output.textContent += args.join(" ") + "\n";
            }
            function clear() {
                output.textContent = "";
            }

            // 1. 변수 선언
            function run_variables() {
                clear();
                log("---변수 선언---");

                // var : 함수 스코프, 재선언 가능 - 예전 방식 지금은 사용 금지
                var old = "옛날 방식";

                // let : 블록 스코프, 재할당 가능 (값이 바뀌어야 할 때 사용)
                let name = "홍길동";
                name = "김철수"; // 재할당 가능

                // const : 블록 스코프, 재할당 불가 -> 기본적으로 사용 권장
                const MAX = 100;
                //  MAX = 200 // 오류 발생 -> 재할당 불가

                log("var:", old);
                log("let 변경 후 : ", name);
                log("const MAX : ", MAX);
                log("");
                log("기본은 const, 값이 바뀌어야 할 때만 let!");
            }

            // 2. 자료형
            function run_types() {
                clear();
                log("---자료형---");

                let name = "홍길동"; // string
                let age = 25; // number
                let pass = true; // boolean
                let score = null; // null : 의도적으로 비어있음
                let address; // undefined : 값이 없음

                // typeof 연산자 : 변수의 타입을 문자열로 변환
                log("typeof name:", typeof name); // string
                log("typeof age:", typeof age); // number
                log("typeof pass:", typeof pass); // boolean
                log("typeof score:", typeof score); // object(JS의 유명한 버그)
                log("typeof address:", typeof address); // undefined

                // 템플릿 리터럴 : 백틱(`) + ${변수} 로 문자열 안에 변수 삽입
                log(`${name}은 ${age}살입니다.`);

                // 형 변환 주의
                // "+" 는 문자열이 하나라도 있으면 문자열 연결로 동작
                log('"5" + 3 = ', "5" + 3); // "53" 문자열임
                // "-" 는 무조건 숫자 연산으로 동작
                log('"5" - 3 = ', "5" - 3);
            }

            // 3. 조건문
            function run_conditions() {
                clear();
                log("---조건문---");

                let point = 59;

                // if / else if / else : 조건에 따라 다른 코드 실행
                if (point >= 90) {
                    log("A학점");
                } else if (point >= 80) {
                    log("B학점");
                } else {
                    log("C학점");
                }
                // 삼항 연산자 : 조건 ? 참일 때 값 : 거짓일 때 값
                // if/else를 한 줄로 표현할 때 사용
                let result = point >= 60 ? "합격" : "불합격";
                log("결과 : ", result);

                // 논리 연산자 단축 평가 (||)
                // 왼쪽 값이 falsy(null, undefined, false, 0, "")일 경우 오른쪽 값 사용
                // 왼쪽 값이 truthy 면 왼쪽 값 그대로 사용
                let user = null;
                log(user || "비회원"); // null -> falsy -> '비회원' 출력
                let loginUser = "홍길동";
                log(loginUser || "비회원"); // '홍길동' -> truthy -> '홍길동' 출력
            }

            // 4. 반복문
            function run_loops() {
                clear();
                log("---반복문---");

                // for : for (초기값 ; 조건 ; 증감식) { 반복할 코드 }
                log("---for---");
                for (let i = 1; i <= 5; i++) {
                    log(i + "번째");
                }

                // for ... of : 배열에 값을 하나씩 꺼내서 순회
                // for (변수 of 배열) { 반복할 코드 }
                log("---for ... of---");
                let fruits = ["사과", "바나나", "딸기"];
                for (let fruit of fruits) {
                    log(fruit); // '사과', '바나나', '딸기' 순서로 출력
                }

                // for ... in : 객체에 키(key)를 하나씩 꺼내서 순회
                // for (변수 in 객체) { 반복할 코드 }
                log("---for ... in---");
                let person = { name: "홍길동", age: 25 };
                for (let key in person) {
                    log(key + " : " + person[key]); // name: 홍길동, age: 25
                }
            }

            // 5. 함수
            function run_functions() {
                clear();
                log("---함수---");

                // 함수 선언식 : function 함수명(매개변수) { return 반환값 }
                // 선언 전에 호출해도 동작 (호이스팅)

                function greet(name) {
                    return "안녕하세요, " + name + "님!";
                }

                // 함수 표현식 : 변수에 함수를 저장
                // 선언 전에 호출 불가
                const add = function (a, b) {
                    return a + b;
                };

                // 화살표 함수 : (매개변수) => 반환값
                // 중괄호 { } 없으면 return 자동, 있으면 return 직접 써야 함
                const multiply = (a, b) => a * b; // (a, b) => { return a * b } 와 동일

                log(greet("이순신"));
                log("3+5 = ", add(3, 5));
                log("4*6 = ", multiply(4, 6));
                log("");

                // 기본값 매개변수 : 인수를 안 넘기면 기본값 사용
                // function 함수명(매개변수 = 기본값) {}
                function welcome(name = "방문자") {
                    return name + "님, 환영합니다!";
                }
                log(welcome());
                log(welcome("장영실"));
            }

            // 6. 객체 & 배열
            // 6-1. 객체
            function run_objects() {
                clear();
                log("---객체---");

                const student = {
                    name: "이자겸",
                    age: 81,
                    skills: ["HTML", "CSS", "JS"],
                    introduce: function () {
                        return "저는" + this.name + ", " + this.age + "살입니다.";
                    },
                };

                log("이름 : ", student.name);
                log("나이 : ", student["age"]);
                log("기술 : ", student.skills[0]);
                log(student.introduce());
                log("");

                // 구조 분해 할당 : 객체 프로퍼티를 변수로 한 번에 추출
                // const {키이름, 키이름} = 객체
                const { name, age } = student;
                log("분해 할당 - ", name, age);
                log("");

                // 스프레드 연산자(...) : 객체를 펼쳐서 복사 + 일부 수정
                //  {...원본객체, 덮어쓸 키 : 새 값}
                const updated = { ...student, age: 26 }; // student 복사 후 age만 26으로
                log("업데이트된 나이 : ", updated.age);
            }

            // 6-2. 배열
            function run_arrays() {
                clear();
                log("---배열---");

                const numbers = [1, 2, 3, 4, 5];
                log("원본 : ", numbers.join(", "));
                log("");

                // map : 배열 요소마다 함수를 적용해서 새 배열 반환
                // 배열.map(요소 => 변환식)
                const doubled = numbers.map((n) => n * 2);
                log("map x2 : ", doubled.join(", "));

                // filter : 조건을 만족하는 요소만 골라 새 배열 반환
                // 배열.filter(요소 -> 조건식)
                const evens = numbers.filter((n) => n % 2 === 0); //짝수만 추출
                log("filter (짝수) : ", evens.join(", "));

                // find : 조건을 만족하는 첫 번째 요소 하나만 반환 (없으면 undefined)
                // 배열.find(요소 => 조건식)
                const over3 = numbers.find((n) => n > 3); // 3보다 큰 첫번째 숫ㅈ
                log("find (3초과) : ", over3);

                // reduce : 배열을 하나의 값으로 누적 계산
                // 배열.reduce((누적값, 현재요소) => 계산식, 초기값)
                const total = numbers.reduce((acc, n) => acc + n, 0); //합계
                log("reduce(합계) : ", total);
            }

            // 7. 콜백 함수
            function run_callbacks() {
                (clear(), log("---콜백 함수---"));

                // 콜백 함수 : 다른 함수의 인자로 전달되는 함수
                function doTask(taskName, callback) {
                    log(`"${taskName}" 작업 시작...`);
                    // ... 작업 수행 로직용 주석
                    log(`"${taskName}" 작업 완료!`);
                    callback(); // 완료 후 콜백 실행
                }

                doTask("파일 저장", function () {
                    log("-> 저장 완료 후 알림 표시");
                });
                log("");

                // 배열 메서드의 콜백
                log("forEach (콜백 활용)");
                [10, 20, 30].forEach(function (item, index) {
                    log(`인덱스 ${index}: ${item}`);
                });
                log("");

                // setTimeout : N ms 후에 콜백 실행
                log("3초 후에 메시지가 추가됩니다...");
                setTimeout(function () {
                    log("3초가 지났어요! setTimeout 콜백");
                }, 3000);

                // setInterval : N ms 마다 콜백 반복 실행
                let tick = 0;
                const intervalId = setInterval(function () {
                    tick++;
                    log(`tick : ${tick}`);
                    if (tick >= 3) {
                        clearInterval(intervalId); // 3번 후 정지
                        log("인터벌 종료");
                    }
                }, 1000);
            }
        </script>
    </body>
</html>
