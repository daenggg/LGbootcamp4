<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>그림판</title>
        <style>
            /* 전체적인 레이아웃 : 화면 중앙 정렬 및 배경색 설정 */
            body {
                display: flex;
                flex-direction: column;
                align-items: center;
                background: #f4f7f6;
                padding: 20px;
            }

            /* canvas : 실제로 그림이 그려지는 영역 */
            canvas {
                border: 3px solid #333;
                background: white;
                cursor: crosshair;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            }

            /* 하단 도구 모음 : 버튼과 입력창들을 가로로 정렬 */
            .controls {
                margin-top: 20px;
                display: flex;
                gap: 15px;
                align-items: center;
                background: white;
                padding: 15px 30px;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            }

            .controls-item {
                display: flex;
                align-items: center;
                gap: 10px;
            }

            label {
                font-weight: bold;
                color: #555;
            }

            /* 버튼 공통 스타일 */
            button {
                padding: 10px 18px;
                cursor: pointer;
                border: none;
                font-weight: bold;
            }

            /* active 클래스 : 현재 선택된 도구(펜/지우개)를 시각적으로 강조 */
            .active {
                outline: 3px solid orange;
            }
        </style>
    </head>
    <body>
        <h2>자바스크립트 그림판!</h2>
        <canvas id="drawCanvas" width="800" height="500"></canvas>

        <div class="controls">
            <button id="penBtn" class="mode-btn active">펜</button>
            <button id="eraserBtn" class="eraser-btn">지우개</button>

            <div class="control-item">
                <label for="colorPicker">색상 : </label>
                <input type="color" id="colorPicker" value="#2d3436" />
            </div>

            <div class="control-item">
                <label for="lineWidth">굵기 : </label>
                <input type="range" id="lineWidth" min="1" max="100" value="5" />
                <span id="sizeValue" style="width: 30px; text-align: center">5</span>
            </div>
            <button id="clearBtn" class="clear-btn">전체 초기화</button>
            <button id="saveBtn" class="save-btn">이미지 저장</button>
        </div>

        <script>
            // 1. DOM 요소를 변수에 저장 : HTML 태그를 JS에서 조작하기 위해 가져옵니다.
            const canvas = document.getElementById("drawCanvas");
            const ctx = canvas.getContext("2d"); // 2d 렌더링 컨텍스트 : 실질적인 그리기 도구

            const colorPicker = document.getElementById("colorPicker");
            const lineWidth = document.getElementById("lineWidth");
            const sizeValue = document.getElementById("sizeValue");
            const clearBtn = document.getElementById("clearBtn");
            const penBtn = document.getElementById("penBtn");
            const eraserBtn = document.getElementById("eraserBtn");
            const saveBtn = document.getElementById("saveBtn");

            // 2. 상태 관리 변수 : 현재 그리는 중인지, 지우개 모드인지를 기억합니다.
            let painting = false;
            let isEraser = false;

            // 3. 붓의 초기 환경 설정 : 선의 끝 모양을 둥글게 하고 색상과 굵기를 지정합니다.
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
            ctx.strokeStyle = colorPicker.value;
            ctx.lineWidth = lineWidth.value;

            // 4. 배경색 설정 함수 : 저장 시 투명하게 나오지 않도록 흰색을 미리 채웁니다.
            // 이 4번이 없으면 배경이 투명하게 그림만 저장됩니다.
            function setCanvasBackground() {
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // 이벤트 리스너 : 사용자 상호작용 처리

            // 펜 모드 전환 : 지우개 사애를 해제하고 현재 선택된 색상을 다시 적용합니다.
            penBtn.addEventListener("click", () => {
                isEraser = false;
                ctx.strokeStyle = colorPicker.value;
                penBtn.classList.add("active");
                eraserBtn.classList.remove("active");
            });

            // 지우개 모드 전환 : 붓의 색상을 배경색과 똑같이 만들어 지우는 효과를 냅니다.
            eraserBtn.addEventListener("click", () => {
                isEraser = true;
                ctx.strokeStyle = "#ffffff";
                eraserBtn.classList.add("active");
                penBtn.classList.remove("active");
            });

            // 색상 변경 : 펜 모드일 때만 사용자가 고를 색상을 붓에 적용합니다.
            colorPicker.addEventListener("input", (e) => {
                if (!isEraser) etx.strokeStyle = e.target.value;
            });

            // 굵기 조절 : 슬라이더 값에 따라 선의 두께를 바꾸고 옆의 숫자를 업데이트 합니다.
            lineWidth.addEventListener("input", (e) => {
                const newSize = e.target.value;
                ctx.lineWidth = newSize;
                sizeValue.innerText = newSize;
            });

            // 전체 초기화 : 캔버스를 싹 비우고 다시 흰색 배경을 깝니다.
            clearBtn.addEventListener("click", () => {
                if (confirm("정말로 다 지울까요?")) {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    setCanvasBackground();
                }
            });

            // 이미지 저장 : 캔버스의 픽셀 데이터를 이미지 경로로 변화해 가상의 링크로 다운로드합니다.
            saveBtn.addEventListener("click", () => {
                const image = canvas.toDataURL("image/png");
                const link = document.createElement("a");
                link.href = image;
                link.download = "내-그림.png"; // 다운로드 받을 때 파일 이름
                link.click();
            });

            // 마우스 그리기 핵심 로직

            // 클릭 시작 : 그리기 상태를 true로 바꾸고 현재 위치에서 그리기를 시작합니다.
            function startPosition(e) {
                painting = true;
                draw(e);
            }

            // 클릭 해제 : 그리기 상태를 false로 바꾸고 경로를 초기화합니다.
            function finishedPosition(e) {
                painting = false;
                ctx.beginPath();
            }

            // 그리기 실행 : 마우스 이동 좌표를 계산해 선을 긋고 화면에 표시합니다.
            function draw(e) {
                if (!painting) return; // 마우스를 뗀 상태라면 실행하지 않음
                const rect = canvas.getBoundingClientRect(); // 캔버스의 상태 위치 계산
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                ctx.lineTo(x, y); // 현재 마우스 좌표까지 가상의 선 연결
                ctx.stroke(); // 선을 실제로 그림
                ctx.beginPath(); // 연속적인 선을 위해 경로를 새로고침
                ctx.moveTo(x, y); //붓을 다음 좌표의 시작점으로 이동
            }

            // 캔버스 마우스 이벤트 감시
            canvas.addEventListener("mousedown", startPosition);
            canvas.addEventListener("mouseup", finishedPosition);
            canvas.addEventListener("mousemove", draw);
            canvas.addEventListener("mouseout", finishedPosition);
        </script>
    </body>
</html>
