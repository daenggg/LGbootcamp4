<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>계산기</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Dongle&family=Gasoek+One&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Saira+Stencil:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet"
        />
        <style>
            .calculator {
                background: #eed3ee;
                padding: 24px;
                margin: 100px;
                width: 320px;
                box-shadow: 0 24px 24px 10px #b9a8af;
                border-radius: 50px;
                border: 1px solid #575757;
            }

            /* 디스플레이 */
            .display {
                background: #c5e2ca6c;
                padding: 20px 16px;
                margin-bottom: 20px;
                min-height: 90px;
                display: flex;
                flex-direction: column;
                justify-content: flex-end;
                align-items: flex-end;
                border-radius: 50px;
                flex-wrap: wrap;
                border: 1px solid #535353;
                box-shadow: inset 0 0px 20px 20px #cccccc;
            }

            .display .expression {
                font-size: 1rem;
                color: rgb(0, 0, 0);
                min-height: 20px;
                flex-wrap: wrap;
                max-width: 250px;
                font-weight: 600;
                color: #000000;
                font-family: "Saira Stencil", sans-serif;
                font-style: italic;
                padding-right: 30px;
            }

            .display .current {
                font-size: 2.4rem;
                color: rgb(0, 0, 0);
                letter-spacing: 1px;
                flex-wrap: wrap;
                font-weight: 600;
                color: #000000;
                font-family: "Saira Stencil", sans-serif;
                font-style: italic;
                padding-right: 20px;
            }

            /* 버튼 그리드 */
            .buttons {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 10px;
            }

            button {
                height: 65px;
                /* padding: 20px 0; */
                cursor: pointer;
                border-radius: 100px;
                box-shadow: 0 2px 4px 4px #fff6f6;
                font-size: 40px;
                font-weight: 350;
                color: #646464;
                font-family: "Saira Stencil", sans-serif;
                font-style: italic;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            /* 0 버튼 2칸 차지 */
            .span-two {
                grid-column: span 2;
            }

            .Red {
                background-color: rgb(243, 145, 145);
            }
            .Pink {
                background-color: rgb(255, 223, 250);
            }
            .Yellow {
                background-color: rgb(255, 255, 206);
            }

            .Green {
                background-color: rgb(216, 245, 213);
            }

            .Purple {
                background-color: rgb(229, 193, 243);
            }

            .Blue {
                background-color: rgb(204, 229, 250);
            }
        </style>
    </head>
    <body>
        <div class="calculator">
            <div class="display">
                <div class="expression" id="expression"></div>
                <div class="current" id="current">0</div>
            </div>

            <div class="buttons">
                <!-- 1행 -->
                <button class="btn-util Red" onclick="clearAll()">AC</button>
                <button class="btn-util Pink" onclick="toggleSign()">+/-</button>
                <button class="btn-util Pink" onclick="percent()">%</button>
                <button class="btn-operator Pink" onclick="setOperator('/')">÷</button>

                <!-- 2행 -->
                <button class="btn-number Yellow" onclick="inputNum('7')">7</button>
                <button class="btn-number Yellow" onclick="inputNum('8')">8</button>
                <button class="btn-number Yellow" onclick="inputNum('9')">9</button>
                <button class="btn-operator Yellow" onclick="setOperator('*')">x</button>

                <!-- 3행 -->
                <button class="btn-number Green" onclick="inputNum('4')">4</button>
                <button class="btn-number Green" onclick="inputNum('5')">5</button>
                <button class="btn-number Green" onclick="inputNum('6')">6</button>
                <button class="btn-operator Green" onclick="setOperator('-')">-</button>

                <!-- 4행 -->
                <button class="btn-number Purple" onclick="inputNum('1')">1</button>
                <button class="btn-number Purple" onclick="inputNum('2')">2</button>
                <button class="btn-number Purple" onclick="inputNum('3')">3</button>
                <button class="btn-operator Purple" onclick="setOperator('+')">+</button>

                <!-- 5행 -->
                <button class="btn-number span-two Blue" onclick="inputNum('0')">0</button>
                <button class="btn-number Blue" onclick="inputDot()">.</button>
                <button class="btn-equals Blue" onclick="calculate()">=</button>
            </div>
        </div>

        <script>
            // 상태 변수
            let currentInput = "0"; // 현재 화면에 보이는 숫자
            let previousInput = "0"; // 연산자 앞의 숫자
            let operator = null; // 선택된 연산자 (+, -, *, /)
            let shouldReset = false; // 다음 숫자 입력 시 초기화 여부

            // DOM 요소
            const currentEl = document.getElementById("current");
            const expressionEl = document.getElementById("expression");

            // 화면 업데이트
            function updateDisplay() {
                currentEl.textContent = currentInput;
            }

            // 숫자 입력
            function inputNum(num) {
                // 연산자 직후에는 새 숫자로 초기화 (shouldReset 플래그로 상태 관리)
                if (shouldReset) {
                    currentInput = num;
                    shouldReset = false;
                } else {
                    // string.length : 문자열의 길이 (자릿수 제한에 활용)
                    if (currentInput.length >= 10) return;
                    // 삼항 연산자. 현재값이 '0' 이면 새 숫자로 교체, 아니면 뒤에 이어 붙힘
                    currentInput = currentInput === "0" ? num : currentInput + num;
                }
                updateDisplay();
            }

            // 소수점 입력
            function inputDot() {
                if (shouldReset) {
                    currentInput = "0";
                    shouldReset = false;
                }
                // string.includes('문자') : 문자열에 해당 문자가 포함되면 true
                // 소수점이 이미 있는데 또 찍으면 이상해지므로 중복 방지
                if (!currentInput.includes(".")) {
                    currentInput += ".";
                    updateDisplay();
                }
            }

            // 연산자 선택
            function setOperator(op) {
                // 연산자 연속 클릭 시 중간 계산 먼저
                if (operator && !shouldReset) {
                    calculate();
                }
                previousInput = currentInput;
                operator = op;
                shouldReset = true;

                // 화면에 표현식 표시
                const symbols = { "+": "+", "-": "-", "*": "x", "/": "÷" };
                expressionEl.textContent = `${previousInput} ${symbols[op]}`;
            }

            // 계산
            function calculate() {
                if (!operator || !previousInput) return;

                // parseFloat(문자열) : 문자열을 소수점 포함 (실수) float로 변환
                // parseInt 는 정수만, parseFloat은 소수점도 처리
                const prev = parseFloat(previousInput);
                const curr = parseFloat(currentInput);
                let result;

                // switch(비교값) : 값에 따라 다른 case를 실행
                // case 값 : 실행할 코드; break; - break 없으면 다음 case까지 실행됨!
                switch (operator) {
                    case "+":
                        result = prev + curr;
                        break;
                    case "-":
                        result = prev - curr;
                        break;
                    case "*":
                        result = prev * curr;
                        break;
                    case "/":
                        // 0으로 나누면 수학적으로 정의 불가 -> 특별 처리
                        if (curr === 0) {
                            currentInput = "오류";
                            expressionEl.textContent = "";
                            operator = null;
                            updateDisplay();
                            return;
                        }
                        result = prev / curr;
                        break;
                }

                // 부동소수점 오류 (0.1 + 0.2 = 0.30000000000004 문제)
                // number.toFixed(자릿수) : 소수점 아래 N자리까지만 남기고 반올림 (문자열 반환)
                // parseFloat으로 다시 감싸서 불필요한 0 제거 (1.500000 -> 1.5)
                result = parseFloat(result.toFixed(10));

                const symbols = { "+": "+", "-": "-", "*": "x", "/": "÷" };
                expressionEl.textContent = `${previousInput} ${symbols[operator]} ${currentInput}=`;
                currentInput = String(result);
                operator = null;
                previousInput = "";
                shouldReset = true;
                updateDisplay();
            }

            // 전체 초기화
            function clearAll() {
                currentInput = "0";
                previousInput = "";
                operator = null;
                shouldReset = false;
                expressionEl.textContent = "";
                updateDisplay();
            }

            function toggleSign() {
                if (currentInput === "0" || currentInput === "오류") return;
                currentInput = String(parseFloat(currentInput) * -1);
                updateDisplay();
            }

            // 퍼센트
            function percent() {
                currentInput = String(parseFloat(currentInput) / 100);
                updateDisplay();
            }

            // 키보드 입력 지원
            // document에 이벤트 리스너를 달면 어디서든 키 입력을 받을 수 있음
            document.addEventListener("keydown", function (e) {
                // e.key: 눌린 키의 이름 ('0~9', 'Enter', 'Escape', 'Backspace' 등)
                if (e.key >= "0" && e.key <= "9") inputNum(e.key);
                else if (e.key === ".") inputDot();
                else if (e.key === "+") setOperator("+");
                else if (e.key === "-") setOperator("-");
                else if (e.key === "*") setOperator("*");
                // e.preventDefault() : 브라우저 기본 동작 차단 (/키는 브라우저 검색창 여는 단축키)
                else if (e.key === "/") {
                    e.preventDefault();
                    setOperator("/");
                } else if (e.key === "Enter" || e.key === "=") calculate();
                else if (e.key === "Escape") clearAll();
                else if (e.key === "Backspace") {
                    // string.slice(시작, 끝) : 문자열을 잘라냄
                    // slice(0, -1) -> 맨 마지막 문자 하나를 제거 (뒤에서 1칸 자름)
                    if (currentInput.length > 1) {
                        currentInput = currentInput.slice(0, -1);
                    } else {
                        currentInput = 0;
                    }
                    updateDisplay();
                }
            });

            // 마우스 우클릭 기본 동작 차단
            window.addEventListener("contextmenu", (e) => {
                e.preventDefault();
            });
        </script>
    </body>
</html>
