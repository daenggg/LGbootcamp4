<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap 랜딩 페이지</title>
    <!-- 부트스트랩 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Bootstrap 위에 커스텀 스타일 추가 */
        .hero {
            background: linear-gradient(135deg, #0d0d14 0%, #2d2770 50%, #1257ac 100%);
            color: white;
            padding: 120px 0;
            text-align: center;
        }
    </style>
</head>
<body>
    <!-- 히어로 섹션 -->
    <section class="hero">
        <div class="container">
            <h1 class="mb-3">프론트엔드 개발자가 되세요</h1>
            <p class="mb-5">비전공자도 열심히 해보세요</p>
            <a href="pricing" class="btn btn-danger btn-lg me-2 px-4">수강 신청하기</a>
            <a href="features" class="btn btn-outline-light btn-lg me-2 px-4">자세히 보기</a>
        </div>
    </section>
</body>
</html>
