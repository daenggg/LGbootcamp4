<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Type 실습</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                padding: 40px;
                background: #f5f5f5;
            }

            .filters {
                display: flex;
                gap: 10px;
            }

            .filters-btn {
                padding: 7px 18px;
                cursor: pointer;
            }

            .cards {
                display: flex;
                flex-wrap: wrap;
                gap: 16px;
            }

            .card {
                padding: 22px;
                width: calc(25% - 12px);
            }
        </style>
    </head>
    <body>
        <h1>학생 성적표</h1>
        <p>타입 실습 페이지입니다. 컴파일 후 열어보세요</p>

        <div id="filters"></div>
        <div id="cards" class="cards"></div>

        <script src="./02_타입실습.js"></script>
    </body>
</html>
